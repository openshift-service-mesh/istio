name: Unit Tests

on:
  pull_request:
    branches:
      - master
      - release-*

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  # Read IMAGE_VERSION from the BASE branch so a PR cannot substitute a
  # malicious container image by editing common/scripts/setup_env.sh.
  # Sparse-checkout fetches only the one file we need, keeping this fast.
  preflight:
    name: Resolve Build Image
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.get-image.outputs.image }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.base_ref }}
          sparse-checkout: |
            common/scripts/setup_env.sh
          sparse-checkout-cone-mode: false
      - name: Extract IMAGE_VERSION from base branch
        id: get-image
        run: |
          version=$(grep -E '^\s+IMAGE_VERSION=' common/scripts/setup_env.sh \
                    | head -1 | sed 's/.*IMAGE_VERSION=//')
          if [[ -z "${version}" ]]; then
            echo "::error::Could not extract IMAGE_VERSION from common/scripts/setup_env.sh"
            exit 1
          fi
          image="registry.istio.io/testing/build-tools:${version}"
          echo "image=${image}" >> "$GITHUB_OUTPUT"
          echo "Resolved build image: ${image}"

  unit:
    name: Unit Tests
    needs: preflight
    runs-on: ubuntu-latest
    container:
      image: ${{ needs.preflight.outputs.image }}
      # --privileged is required for two reasons:
      #   1. github.com/howardjohn/unshare-go calls unshare(CLONE_NEWUSER|CLONE_NEWNET)
      #      in its init(); --privileged bypasses the AppArmor restriction that would
      #      otherwise block this on Ubuntu 24.04 runners.
      #   2. The iptables backend probe uses unshare -n, which requires CAP_NET_ADMIN.
      options: --privileged
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      # Prepare the kernel environment for iptables/nftables tests:
      #   - trust the workspace (git dubious-ownership guard)
      #   - enable unprivileged user namespaces (belt-and-suspenders with --privileged)
      #   - probe which iptables backend will be selected so we can skip the one
      #     subtest whose behaviour differs between the legacy and nft backends
      - name: Prepare kernel environment
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 2>/dev/null \
            || sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 || true
          sysctl -w kernel.unprivileged_userns_clone=1 2>/dev/null \
            || sudo sysctl -w kernel.unprivileged_userns_clone=1 || true
          LINES=$(unshare -n ip6tables-legacy-save 2>/dev/null | wc -l)
          if [ "${LINES}" -ge 3 ]; then
            echo "Legacy iptables backend active — no test skip needed"
          else
            echo "nft backend active; skipping backend-specific subtest"
            echo "GOFLAGS=-skip=TestIdempotentEquivalentRerun/ipv6-empty-inbound-ports" >> "$GITHUB_ENV"
          fi
      - run: make -e "T=-v -count=1" BUILD_WITH_CONTAINER=0 build racetest binaries-test
